{% extends "base.html" %}

{% block title %}Novo Paciente - Agendador de Consultas{% endblock %}

{% block content %}
<div class="page-header">
    <h1>👥 Novo Paciente</h1>
</div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="nome">Nome Completo *</label>
        <input type="text" id="nome" name="nome" required class="form-control">
    </div>

    <div class="form-group">
        <label for="cpf">CPF (apenas números) *</label>
        <input type="text" id="cpf" name="cpf" placeholder="12345678901" required class="form-control" maxlength="11">
    </div>

    <div class="form-group">
        <label for="telefone">Telefone *</label>
        <input type="tel" id="telefone" name="telefone" placeholder="11987654321" required class="form-control">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="email@exemplo.com" class="form-control">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Salvar</button>
        <a href="{{ url_for('listar_pacientes') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
