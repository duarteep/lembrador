{% extends "base.html" %}

{% block title %}Novo Profissional - Agendador de Consultas{% endblock %}

{% block content %}
<div class="page-header">
    <h1>👨‍⚕️ Novo Profissional</h1>
</div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="nome">Nome Completo *</label>
        <input type="text" id="nome" name="nome" required class="form-control">
    </div>

    <div class="form-group">
        <label for="especialidade">Especialidade *</label>
        <input type="text" id="especialidade" name="especialidade" 
               placeholder="ex: Cardiologia, Dentista, Psicólogo" required class="form-control">
    </div>

    <div class="form-group">
        <label for="crm">CRM/CREA *</label>
        <input type="text" id="crm" name="crm" placeholder="ex: 123456/SP" required class="form-control">
    </div>

    <div class="form-group">
        <label for="telefone">Telefone *</label>
        <input type="tel" id="telefone" name="telefone" placeholder="1133334444" required class="form-control">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Salvar</button>
        <a href="{{ url_for('listar_profissionais') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
