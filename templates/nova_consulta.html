{% extends "base.html" %}

{% block title %}Agendar Consulta - Agendador de Consultas{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📅 Agendar Consulta</h1>
</div>

<form method="POST" class="form-container" id="consultaForm">
    <div class="form-row">
        <div class="form-group">
            <label for="cpf_paciente">CPF do Paciente *</label>
            <div class="input-group">
                <input type="text" id="cpf_paciente" name="cpf_paciente" 
                       placeholder="12345678901" required class="form-control" maxlength="11">
                <button type="button" class="btn-small" onclick="buscarPaciente()">🔍 Buscar</button>
            </div>
            <span id="pacienteInfo" class="info-text"></span>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="especialidade">Especialidade Desejada *</label>
            <input type="text" id="especialidade" name="especialidade" 
                   placeholder="ex: Cardiologia" required class="form-control"
                   onchange="carregarProfissionais()">
        </div>
        <div class="form-group">
            <label for="profissional_id">Profissional *</label>
            <select id="profissional_id" name="profissional_id" required class="form-control">
                <option value="">Selecione um profissional</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="data_hora">Data e Hora *</label>
            <input type="datetime-local" id="data_hora" name="data_hora" required class="form-control">
        </div>
    </div>

    <div class="form-group">
        <label for="motivo">Motivo da Consulta *</label>
        <textarea id="motivo" name="motivo" required class="form-control" rows="4"
                  placeholder="Descreva o motivo da consulta"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">📅 Agendar</button>
        <a href="{{ url_for('listar_consultas') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

<script>
function buscarPaciente() {
    const cpf = document.getElementById('cpf_paciente').value;
    if (!cpf) {
        alert('Digite um CPF');
        return;
    }

    fetch(`/api/paciente/cpf/${cpf}`)
        .then(response => response.json())
        .then(data => {
            const infoEl = document.getElementById('pacienteInfo');
            if (data.encontrado) {
                infoEl.textContent = `✓ Paciente encontrado: ${data.nome}`;
                infoEl.style.color = 'green';
            } else {
                infoEl.textContent = '✗ Paciente não encontrado';
                infoEl.style.color = 'red';
            }
        })
        .catch(error => console.error('Erro:', error));
}

function carregarProfissionais() {
    const especialidade = document.getElementById('especialidade').value;
    if (!especialidade) return;

    fetch(`/api/profissionais/especialidade/${especialidade}`)
        .then(response => response.json())
        .then(data => {
            const select = document.getElementById('profissional_id');
            select.innerHTML = '<option value="">Selecione um profissional</option>';
            
            if (data.profissionais.length === 0) {
                select.innerHTML += '<option disabled>Nenhum profissional encontrado</option>';
                return;
            }

            data.profissionais.forEach(prof => {
                const option = document.createElement('option');
                option.value = prof.id;
                option.textContent = `${prof.nome} (CRM: ${prof.crm})`;
                select.appendChild(option);
            });
        })
        .catch(error => console.error('Erro:', error));
}

// Define data mínima para amanhã
document.addEventListener('DOMContentLoaded', function() {
    const dataInput = document.getElementById('data_hora');
    const now = new Date();
    now.setDate(now.getDate() + 1);
    now.setHours(14, 0); // 14:00
    
    const formatted = now.toISOString().slice(0, 16);
    dataInput.setAttribute('min', formatted);
    dataInput.value = formatted;
});
</script>
{% endblock %}
